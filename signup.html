<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Poonawalla Fincorp Loan Wizard</title>
  <link rel="stylesheet" href="styles/main.css" />
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 10;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .auth-logo {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .auth-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: #fff;
    }
    .auth-sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--brand-gold);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
    }
    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--brand-gold);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div id="toast-container"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🏦</div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-sub">Enter your details to register with Poonawalla Wizard</p>
      </div>

      <form id="signup-form" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="reg-name" placeholder="Ankush Gupta" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="reg-email" placeholder="name@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Create Password</label>
          <input type="password" class="form-input" id="reg-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="reg-btn" style="margin-top: 1rem;">
          Sign Up Now
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script>
    async function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const pass = document.getElementById('reg-password').value;
      const btn = document.getElementById('reg-btn');

      const API = window.location.origin.includes('localhost') ? 'http://localhost:5001/api' : '/api';
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Creating Account...';

      try {
        const resp = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: email, full_name: name, password: pass })
        });
        const data = await resp.json();
        if (data.success) {
          showToast('Account created successfully! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          showToast(data.message || 'Registration failed', 'error');
        }
      } catch (err) {
        showToast('Server connection failed', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign Up Now';
      }
    }

    function showToast(msg, type = 'info') {
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      const container = document.getElementById('toast-container');
      if (!container) {
        const div = document.createElement('div');
        div.id = 'toast-container';
        document.body.appendChild(div);
      }
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><span class="toast-msg">${msg}</span>`;
      document.getElementById('toast-container').appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }
  </script>
</body>
</html>
